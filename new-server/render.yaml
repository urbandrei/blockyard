databases:
  - name: blockyard-db
    plan: free
    databaseName: blockyard
    user: blockyard

services:
  - type: web
    name: blockyard-api
    runtime: node
    plan: free
    rootDir: new-server
    buildCommand: npm ci && npm run build && npm run db:migrate
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: blockyard-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        sync: false
      - key: DISCORD_APP_ID
        sync: false
      - key: DISCORD_PUBLIC_KEY
        sync: false
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: DISCORD_CHANNEL_ID
        sync: false
      - key: SHARE_BASE_URL
        sync: false
      - key: ADMIN_TOKEN
        generateValue: true
      - key: PREVIEW_DIR
        value: /var/data/previews
      - key: OG_REDIRECT_BASE
        value: https://www.block-yard.com
      - key: API_PUBLIC_BASE
        value: https://blockyard-api.onrender.com
    disk:
      name: blockyard-data
      mountPath: /var/data
      sizeGB: 1
