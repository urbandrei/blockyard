databases:
  - name: blockyard-db
    plan: free
    databaseName: blockyard
    user: blockyard

services:
  - type: web
    name: blockyard-api
    runtime: node
    plan: free
    rootDir: new-server
    buildCommand: npm ci && npm run build && npm run db:migrate
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: blockyard-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        sync: false
      - key: DISCORD_APP_ID
        sync: false
      - key: DISCORD_PUBLIC_KEY
        sync: false
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: ADMIN_TOKEN
        generateValue: true
